<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAProxy</title>
  <style>
    body {
      margin: 0;
      background: #0d1f13;
      color: #4cff8a;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: .1em;
      text-shadow: 0 0 20px #4cff8a;
    }

    .status {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: 1rem;
      color: #2ecc71;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #2ecc71;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    table {
      border-collapse: collapse;
      font-size: .9rem;
      min-width: 320px;
    }

    td {
      padding: .5rem 1.2rem;
      border: 1px solid #1a3d25;
    }

    td:first-child { color: #2ecc71; }
    td:last-child  { color: #a0ffb8; text-align: right; }

    .links {
      display: flex;
      gap: 1.5rem;
      margin-top: .5rem;
    }

    a {
      color: #2ecc71;
      text-decoration: none;
      font-size: .85rem;
      border-bottom: 1px solid #1a3d25;
      padding-bottom: 2px;
    }

    a:hover { color: #4cff8a; border-color: #4cff8a; }

    footer {
      font-size: .72rem;
      color: #1a3d25;
      margin-top: 1rem;
    }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }
  </style>
</head>
<body>

  <div class="logo">HAProxy</div>

  <div class="status">
    <div class="dot"></div>
    Opérationnel
  </div>

  <table>
    <tr><td>Version</td>   <td>2.9.4</td></tr>
    <tr><td>Uptime</td>    <td>12j 4h 37m</td></tr>
    <tr><td>Backends</td>  <td>4 / 4 UP</td></tr>
    <tr><td>Connexions</td><td>642 actives</td></tr>
  </table>

  <div class="links">
    <a href="/stats">Statistiques</a>
    <a href="/admin">Administration</a>
    <a href="https://www.haproxy.org" target="_blank">Documentation</a>
  </div>

  <footer>node-01.internal · HAProxy 2.9.4</footer>

</body>
</html>
